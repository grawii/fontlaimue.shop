<!-- FLOATING BOTTOM BAR ดีไซน์ใหม่: Center Dock บาลานซ์ ไม่ซ้ำใคร -->
<nav id="floatingBottomNav" class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] bg-white/80 backdrop-blur-lg h-16 rounded-3xl shadow-[0_10px_30px_rgba(0,0,0,0.08)] z-40 flex items-center justify-between px-2 border border-white/40">
    
    <!-- ปุ่มฝั่งซ้าย: กลับหน้าหลัก/ล้างฟิลเตอร์ -->
    <button onclick="storeFilterCat='ทั้งหมด'; storeFilterStyle='ทั้งหมด'; renderStore(); closeProductDetail(); closeSubPage('cartPage'); closeSubPage('reviewPage');" class="flex-1 flex flex-col items-center justify-center gap-0.5 text-main">
        <i class="fa-solid fa-house text-base"></i>
        <span class="text-[9px] font-bold">หน้าแรก</span>

    <!-- ปุ่มตรงกลาง: ตะกร้าสินค้า (ดีไซน์จมลงในแถบแบบเนียนตา ไม่ลอยเบียดฝั่ง) -->

        <button onclick="openCartPage()" class="w-14 h-14 btn-main text-white rounded-2xl flex flex-col items-center justify-center shadow-md -translate-y-4 active:scale-95 transition-transform relative">

        </button>
    </div>

    <!-- ปุ่มฝั่งขวา: ดูรีวิวร้านค้า -->
